services:
  db:
    image: mysql:8.0
    container_name: luciastuy-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MYSQL_USER: ${MYSQL_USER:-wordpress}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - wordpress-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:php8.2-apache
    container_name: luciastuy-wordpress
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${WORDPRESS_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_lucia_}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-1}
      WORDPRESS_CONFIG_EXTRA: ${WORDPRESS_CONFIG_EXTRA:-}
    volumes:
      - wordpress-core:/var/www/html
      - wordpress-plugins:/var/www/html/wp-content/plugins
      - wordpress-uploads:/var/www/html/wp-content/uploads
      - ./wp-content/themes/luciastuy:/var/www/html/wp-content/themes/luciastuy
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins

  wpcli:
    image: wordpress:cli-php8.2
    container_name: luciastuy-wpcli
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    working_dir: /var/www/html
    entrypoint: ["wp"]
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_lucia_}
    volumes:
      - wordpress-core:/var/www/html
      - wordpress-plugins:/var/www/html/wp-content/plugins
      - wordpress-uploads:/var/www/html/wp-content/uploads
      - ./wp-content/themes/luciastuy:/var/www/html/wp-content/themes/luciastuy
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: luciastuy-phpmyadmin
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}

volumes:
  wordpress-core:
  wordpress-db-data:
  wordpress-plugins:
  wordpress-uploads:
